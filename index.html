<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Push operation simulator</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Outfit', sans-serif;
        background: #f2f1e8;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    /* Title */
    .title {
        text-align: center;
        font-size: 36px;
        font-weight: 600;
        margin: 10px 0;
    }

    /* Instructions */
    .instructions {
        text-align: center;
        font-size: 22px;
        margin-bottom: 10px;
    }

    /* Input */
    .input-section {
        text-align: center;
        margin-bottom: 10px;
        font-size: 20px;
    }

    input {
        padding: 10px;
        font-size: 20px;
        width: 200px;
        margin-left: 10px;
    }

    /* Main layout */
    .main {
        display: flex;
        flex: 1;
        gap: 15px;
        padding: 10px;
    }

    /* Code container */
    .code-container {
        flex: 1;
        background: #2f2a44;
        color: #f9f9fa;
        padding: 15px;
        border-radius: 12px;
        font-size: 20px;
        overflow-y: auto;
    }

    /* Stack container */
    .stack-container {
        flex: 1;
        background: #724b9e;
        padding: 15px;
        border-radius: 12px;
        display: flex;
        flex-direction: column-reverse;
        align-items: center;
    }

    .stack-block {
        background: #77a766;
        color: #f2f1e8;
        padding: 15px;
        margin: 8px;
        width: 60%;
        text-align: center;
        border-radius: 8px;
        font-size: 20px;
        font-weight: 500;
    }

    /* Buttons */
    .buttons {
        text-align: center;
        margin: 10px 0;
    }

    button {
        padding: 12px 25px;
        margin: 5px;
        font-size: 18px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: 'Outfit', sans-serif;
    }

    .next {
        background: #77a766;
        color: #f2f1e8;
    }

    .reset {
        background: #724b9e;
        color: #f9f9fa;
    }

    /* Footer */
    .footer {
        text-align: center;
        font-size: 16px;
        padding: 5px;
    }

</style>
</head>

<body>

<div class="title">Push operation simulator</div>

<div class="instructions">
    Enter a value → Click Next to PUSH → Observe stack (LIFO) → Reset to restart
</div>

<div class="input-section">
    <label>Enter value:</label>
    <input type="text" id="valueInput">
</div>

<div class="main">

    <div class="code-container" id="codeBox">
        stack = []
    </div>

    <div class="stack-container" id="stackBox"></div>

</div>

<div class="buttons">
    <button class="next" onclick="pushValue()">Next</button>
    <button class="reset" onclick="resetStack()">Reset</button>
</div>

<div class="footer">@curiousEd.ai</div>

<script>
let stack = [];

function pushValue() {
    let input = document.getElementById("valueInput");
    let value = input.value.trim();

    if (value === "") return;

    stack.push(value);
    updateStack();

    let codeBox = document.getElementById("codeBox");
    codeBox.innerHTML += "<br>stack.append(" + value + ")";

    input.value = "";
}

function updateStack() {
    let stackBox = document.getElementById("stackBox");
    stackBox.innerHTML = "";

    for (let i = stack.length - 1; i >= 0; i--) {
        let block = document.createElement("div");
        block.className = "stack-block";
        block.innerText = stack[i];
        stackBox.appendChild(block);
    }
}

function resetStack() {
    stack = [];
    document.getElementById("stackBox").innerHTML = "";
    document.getElementById("codeBox").innerHTML = "stack = []";
    document.getElementById("valueInput").value = "";
}
</script>

</body>
</html>
