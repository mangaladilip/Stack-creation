<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- Mobile responsiveness -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Push operation simulator</title>

<!-- Outfit Font -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Outfit', sans-serif;
        background: #f2f1e8;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    /* Title */
    .title {
        text-align: center;
        font-size: clamp(22px, 2vw, 34px);
        font-weight: 600;
        margin-top: 10px;
    }

    /* Instructions */
    .instructions {
        text-align: center;
        font-size: clamp(16px, 1.5vw, 22px);
        margin: 10px 0;
    }

    /* Input */
    .input-section {
        text-align: center;
        margin-bottom: 10px;
    }

    input {
        padding: 8px;
        font-size: clamp(16px, 1.2vw, 20px);
        font-family: 'Outfit', sans-serif;
    }

    /* Main layout */
    .main {
        display: flex;
        flex: 1;
        gap: 12px;
        padding: 10px;
        box-sizing: border-box;
    }

    /* Code container */
    .code-container {
        flex: 1;
        background: #2f2a44;
        color: #f9f9fa;
        padding: 12px;
        border-radius: 12px;
        overflow-y: auto;
        font-size: clamp(16px, 1.2vw, 20px);
    }

    /* Stack container */
    .stack-container {
        flex: 1;
        background: #724b9e;
        padding: 12px;
        border-radius: 12px;
        display: flex;
        flex-direction: column-reverse;
        align-items: center;
    }

    .stack-block {
        background: #77a766;
        color: #f2f1e8;
        padding: 12px;
        margin: 6px;
        width: 70%;
        text-align: center;
        border-radius: 6px;
        font-size: clamp(16px, 1.2vw, 20px);
    }

    /* Buttons */
    .buttons {
        text-align: center;
        margin-bottom: 10px;
    }

    button {
        padding: 10px 20px;
        margin: 5px;
        border: none;
        cursor: pointer;
        font-size: clamp(14px, 1vw, 18px);
        border-radius: 6px;
        font-family: 'Outfit', sans-serif;
    }

    .next {
        background: #77a766;
        color: #f2f1e8;
    }

    .reset {
        background: #724b9e;
        color: #f9f9fa;
    }

    /* Footer */
    .footer {
        text-align: center;
        font-size: clamp(12px, 0.9vw, 16px);
        padding: 6px;
    }

    /* Mobile layout adjustment */
    @media (max-width: 768px) {
        .main {
            flex-direction: column;
        }
    }

</style>
</head>

<body>

<!-- Title -->
<div class="title">Push operation simulator</div>

<!-- Instructions -->
<div class="instructions">
    Enter a value → Click Next to PUSH → Observe stack (LIFO) → Reset to restart
</div>

<!-- Input -->
<div class="input-section">
    <label>Enter value: </label>
    <input type="text" id="valueInput">
</div>

<!-- Main -->
<div class="main">

    <!-- Code -->
    <div class="code-container" id="codeBox">
        stack = []
    </div>

    <!-- Stack -->
    <div class="stack-container" id="stackBox"></div>

</div>

<!-- Buttons -->
<div class="buttons">
    <button class="next" onclick="pushValue()">Next</button>
    <button class="reset" onclick="resetStack()">Reset</button>
</div>

<!-- Footer -->
<div class="footer">@curiousEd.ai</div>

<script>
let stack = [];

function pushValue() {
    let input = document.getElementById("valueInput");
    let value = input.value.trim();

    if (value === "") return;

    stack.push(value);
    updateStack();

    let codeBox = document.getElementById("codeBox");
    codeBox.innerHTML += "<br>stack.append(" + value + ")";

    input.value = "";
}

function updateStack() {
    let stackBox = document.getElementById("stackBox");
    stackBox.innerHTML = "";

    for (let i = stack.length - 1; i >= 0; i--) {
        let block = document.createElement("div");
        block.className = "stack-block";
        block.innerText = stack[i];
        stackBox.appendChild(block);
    }
}

function resetStack() {
    stack = [];
    document.getElementById("stackBox").innerHTML = "";
    document.getElementById("codeBox").innerHTML = "stack = []";
    document.getElementById("valueInput").value = "";
}
</script>

</body>
</html>
